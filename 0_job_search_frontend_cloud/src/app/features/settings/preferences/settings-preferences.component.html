<app-page-header title="Job Preferences" subtitle="Location, CTC, notice period, and availability settings." />

@if (loading) {
  <app-loading-spinner />
} @else {
  <form class="form-card" [formGroup]="form" (ngSubmit)="save()">
    <label>Current Location<input formControlName="currentLocation" /></label>
    <label>Preferred Locations (comma separated)<input formControlName="preferredLocations" /></label>
    <label>Current CTC<input formControlName="currentCTC" type="number" /></label>
    <label>Expected CTC<input formControlName="expectedCTC" type="number" /></label>
    <label>Notice Period (days)<input formControlName="noticePeriodDays" type="number" /></label>
    <label class="checkbox">
      <input formControlName="openToWork" type="checkbox" />
      Open to work
    </label>
    <button type="submit" class="btn btn-primary">Save Preferences</button>
    @if (saved) { <span class="saved">Saved successfully</span> }
  </form>
}
