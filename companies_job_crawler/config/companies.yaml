scheduler:
  max_workers: 5
  tick_interval_seconds: 60

companies:
  - id: mastercard
    name: Mastercard
    enabled: true
    interval_minutes: 15
    offset_minutes: 0
    crawler_type: playwright
    url: https://careers.mastercard.com

  - id: visa
    name: Visa
    enabled: true
    interval_minutes: 15
    offset_minutes: 1
    crawler_type: playwright
    url: https://jobs.visa.com

  - id: uber
    name: Uber
    enabled: true
    interval_minutes: 15
    offset_minutes: 2
    crawler_type: html
    url: https://www.uber.com/us/en/careers/list/
